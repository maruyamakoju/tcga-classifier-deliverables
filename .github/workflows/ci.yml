name: CI

on:
  push:
  pull_request:

jobs:
  test-release:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install lightweight dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-light.txt
          python -m pip install pytest

      - name: Run regression tests
        run: python -m pytest -q -rs

      - name: Run publication readiness audit
        run: python audit_publication_readiness.py

      - name: Run release acceptance
        run: python run_release_acceptance.py --timeout-seconds 300

      - name: Validate release bundle parity
        run: >
          python validate_release_lite.py
          --release-dir release-lite
          --zip tcga-tumor-normal-release-lite.zip
          --source-root .
          --artifacts RELEASE_ARTIFACTS.json

      - name: Verify release rebuild reproducibility
        run: |
          python build_release_lite.py --smoke --timeout-seconds 300
          git diff --exit-code -- release-lite
