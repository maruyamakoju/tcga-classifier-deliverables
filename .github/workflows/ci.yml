name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUTF8: "1"

jobs:
  full-unit:
    name: full-unit / py3.11
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-light.txt
            requirements-external-validation.txt
            requirements-training.txt
            requirements-dev.txt

      - name: Install full development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip check

      - name: Lint
        run: python -m ruff check .

      - name: Type-check public scoring API
        run: python -m mypy

      - name: Run strict full regression tests
        run: python -m pytest -q

      - name: Enforce release identity
        run: python audit_release_identity.py

      - name: Run publication readiness audit
        run: python audit_publication_readiness.py

  test-release:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-light.txt

      - name: Install lightweight release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-light.txt
          python -m pip check

      - name: Run lightweight release acceptance
        run: python run_release_acceptance.py --timeout-seconds 300

      - name: Validate committed release bundle
        run: >
          python validate_release_lite.py
          --release-dir release-lite
          --zip tcga-tumor-normal-release-lite.zip
          --source-root .
          --artifacts RELEASE_ARTIFACTS.json

      - name: Validate trusted ZIP digest and extracted acceptance
        run: >
          python -c "import json, subprocess, sys;
          a=json.load(open('RELEASE_ARTIFACTS.json', encoding='utf-8'));
          sys.exit(subprocess.call([sys.executable, 'validate_zip_bundle.py',
          'tcga-tumor-normal-release-lite.zip', '--expected-sha256', a['zip_sha256']]))"

      - name: Verify canonical release rebuild without modifying checkout
        run: python build_release_lite.py --check --smoke --timeout-seconds 300
